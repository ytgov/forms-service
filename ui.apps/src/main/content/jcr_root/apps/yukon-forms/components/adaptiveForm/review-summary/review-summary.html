<!--
  HTL template for the Review Summary component.

  Drop this component onto any Adaptive Form's Review/Finish panel.
  The client-side JS (review-summary.js) dynamically populates
  the #review-summary-root element via GuideBridge at runtime.

  Authoring dialog properties (set on the component node):
    - excludedFields  : String[] — field names to suppress (e.g. hidden tokens)
    - showEditLinks   : Boolean  — whether to render "Edit" nav links per section
    - sectionHeadingTag : String — h2 | h3 | h4 (default: h3)
-->
<div data-sly-use.model="ca.yukon.aem.core.models.ReviewSummaryModel"
     class="review-summary"
     data-excluded-fields="${model.excludedFieldsJson}"
     data-show-edit-links="${model.showEditLinks}"
     data-section-heading-tag="${model.sectionHeadingTag}"
     id="review-summary-root">

  <!--
    Rendered at runtime by review-summary.js.
    This placeholder is shown only while GuideBridge initialises.
  -->
  <div class="review-summary__loading" aria-live="polite">
    <span>Loading your responses&hellip;</span>
  </div>
</div>
